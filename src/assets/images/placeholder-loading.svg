<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="ja-shimmer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F5F0E8" />
      <stop offset="45%" stop-color="#FDFBF7" />
      <stop offset="55%" stop-color="#FDFBF7" />
      <stop offset="100%" stop-color="#F5F0E8" />
      <animateTransform
        attributeName="gradientTransform"
        type="translate"
        from="-1 0"
        to="1 0"
        dur="1.6s"
        repeatCount="indefinite"
      />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#ja-shimmer)" />
  <text
    x="200"
    y="150"
    font-family="Georgia, 'Cormorant Garamond', 'Times New Roman', serif"
    font-size="80"
    fill="#4B2307"
    fill-opacity="0.08"
    text-anchor="middle"
    dominant-baseline="central"
    letter-spacing="4"
  >JA</text>
</svg>
